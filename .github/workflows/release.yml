name: Release

# Push a tag like v1.2.3 to build the downloads and publish a GitHub Release.
# Assets produced:
#   * ClickLight-vX.Y.Z-win-x64.exe   - small framework-dependent app (needs .NET 10 installed)
#   * ClickLight-vX.Y.Z-win-arm64.exe - the same for Windows-on-Arm machines
#   * ClickLight-vX.Y.Z-Setup.exe     - x64 installer that also installs .NET 10 if it is missing
#   * *.nupkg + releases.*.json       - Velopack update feed the in-app updater reads
#
# Code signing (SignPath, free for open-source) is applied automatically once the
# repository is configured for it. The signing steps are skipped until then, so an
# unsigned release still builds. See the "Code signing" section in the README for setup.
on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write # required to create the release and upload assets

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so MinVer derives the tagged version

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Version from tag
        id: ver
        shell: pwsh
        run: "echo \"version=$('${{ github.ref_name }}'.TrimStart('v'))\" >> $env:GITHUB_OUTPUT"

      - name: Publish bare app (framework-dependent, single file)
        run: >
          dotnet publish src/ClickLightWin/ClickLightWin.csproj
          -c Release -r win-x64 --no-self-contained
          -p:PublishSingleFile=true -o single

      - name: Publish bare app for arm64
        run: >
          dotnet publish src/ClickLightWin/ClickLightWin.csproj
          -c Release -r win-arm64 --no-self-contained
          -p:PublishSingleFile=true -o single-arm64

      - name: Publish app for the installer (framework-dependent)
        run: >
          dotnet publish src/ClickLightWin/ClickLightWin.csproj
          -c Release -r win-x64 --no-self-contained -o app

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk --version 1.2.0

      - name: Build installer (bootstraps .NET 10 if missing)
        run: >
          vpk pack -u ClickLight -v ${{ steps.ver.outputs.version }}
          -p app -e ClickLightWin.exe -o releases
          --framework net10.0-x64-desktop --packTitle ClickLight

      - name: Stage release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force assets | Out-Null
          Copy-Item single/ClickLightWin.exe "assets/ClickLight-${{ github.ref_name }}-win-x64.exe"
          Copy-Item single-arm64/ClickLightWin.exe "assets/ClickLight-${{ github.ref_name }}-win-arm64.exe"
          Copy-Item releases/ClickLight-win-Setup.exe "assets/ClickLight-${{ github.ref_name }}-Setup.exe"

      # ---- Code signing via SignPath (skipped until repo variables are set) ----
      - name: Upload unsigned assets for signing
        if: ${{ vars.SIGNPATH_ORGANIZATION_ID != '' }}
        id: unsigned
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-assets
          path: assets

      - name: Sign with SignPath
        if: ${{ vars.SIGNPATH_ORGANIZATION_ID != '' }}
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_ARTIFACT_CONFIG_SLUG }}
          github-artifact-id: ${{ steps.unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: assets # overwrites the staged files with signed ones

      # The in-app updater (Velopack GithubSource) reads the channel feed index and
      # the full .nupkg from the release assets. Stage them AFTER signing so the
      # SignPath step only ever sees the .exe files (and its overwrite of the assets
      # directory cannot drop the feed). Keep their original names, which the
      # updater matches on.
      - name: Stage Velopack update feed
        shell: pwsh
        run: |
          Copy-Item releases/*.nupkg assets/ -ErrorAction SilentlyContinue
          Copy-Item releases/*.json  assets/ -ErrorAction SilentlyContinue

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: assets/*             # exes + Velopack feed (.nupkg, releases.*.json)
          body_path: RELEASE_NOTES.md    # curated intro, prepended...
          generate_release_notes: true   # ...then the auto per-version changelog
          fail_on_unmatched_files: true
