name: Release

# Push a tag like v1.2.3 to build the standalone exe and publish a GitHub Release.
on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write # required to create the release and upload assets

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so MinVer derives the tagged version

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish self-contained single-file exe
        run: >
          dotnet publish src/ClickLightWin/ClickLightWin.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Name the artifact after the tag
        shell: pwsh
        run: Copy-Item publish/ClickLightWin.exe "ClickLightWin-${{ github.ref_name }}-win-x64.exe"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ClickLightWin-*-win-x64.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
